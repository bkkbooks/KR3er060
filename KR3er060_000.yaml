front:
  text: 序醫之道奚起乎造物以正氣生人而不能無夭札疫癘之患故復假諸物性之相輔相制者以為補救而寄權於醫夭可使壽弱可使強病可使痊困可使起醫實代天生人參其功而平其憾者也溯自農皇肇起辨草木以著藥性軒岐繼作明陰陽以著內經至漢末篤生張仲景先師上承農軒之理著卒病雜病兩論率皆倡明正學以垂醫統仲師既沒而經論之道遂失其傳舛謬紛紜靡所止極甚且家自為書人自為學世之所以賴有醫者反不若無醫之為愈每為曠覽竊嘗病之我士宗夫子性靈獨異學識超群注釋經論既已述大道而正其傳暇日集群弟子往復論難提命之下及門手録顏曰醫學真傳其間陰陽血氣臟腑經絡與夫五運六氣之理凡前聖所孕含未剖者闡著靡遺而諸書所表章未備者迄無餘蘊洵足補救斯人而為功於造物其所繫豈淺鮮哉嗣等彙集成帙摘其要者梓以問世使皆知醫之傳有其真而學以不偽是誠我夫子扶挽斯道之志也夫時康熙己卯之春錢塘王嘉嗣子佳敬題序粵自蒼昊好生軒岐應運而吐辭立説皆為福民壽世之符送難設奇罔非起病回疴之術自茲以還作者代有如淳于意張仲景以及丹溪東垣諸君子靡不飲流池上洞腑垣中其定方用藥靡不曲曲中窾誠渡世之慈航濟時之寶筏也自正學失傳醫宗罔據而陰陽虛實每以臆猜表裡炎涼鮮從脈究譬之南轅北轍卻行求前冀其有濟蓋亦難矣吾杭高士宗先生醫學真傳一書潛搜默會剔隱鉤微意宗前哲而言其所未言説本先民而發其所未發辨之於疑似而無毫釐千里之差晰之於微茫而有一舉百當之妙固已入堂躋奧而非稍窺藩閫者所可望其肩項也余雅不攻醫客歲緣弱息患疹本屬輕證可調和立愈延請兒科數人皆稱時彥始則太用攻發致起痰喘繼又過投寒涼禁止飲食遂致不起及讀真傳言疹一段而始嘆弱息之死攻發使之寒涼速之也況疹非痘比治之匪難而猶見惑於臨證固是知肌表榮衛之中臟腑經絡之內其難治有十倍於疹者能保其百無一失也乎噫醫之誤人非特余實被之世之未讀是書而憒憒焉以人命為嘗試者真實繁有徒也因將是書謹為重梓俾遠近播傳庶幾藉是以上窺淳于仲景諸公之旨則此書固醫學之指南云時康熙歲次庚寅仲春月錢塘姚遠聖功氏識
