body:
  text: 高士宗先生手授醫學真傳丙子春先生聚門弟子於侶山講堂講學論道四載有餘群弟子先後進問道漸以明醫漸以備先生著示及門嗣等手録者不下百餘則因謂及門曰此醫學真傳也汝等録之將來可以公諸天下矣嗣等因摘述而授之梓醫道失傳醫道昉乎軒岐軒岐著內經一十八卷闡明陰陽血氣運行之理臟腑經絡交會之道上下內外升降出入道晰其微理晰其奧以為後之醫者必明三陰三陽之六氣血氣生始之根源五臟交通六腑會合及絡脈經脈之淺深皮肌筋骨之外內始可言醫仲景先師傷寒序云經絡府俞陰陽會通玄冥幽微變化難極自非才高識妙不能探其理致慨世之醫昧聖賢經論之本源襲後人方書之糟粕湯方歌括之册視為祕典分門別類之書奉若聖經豈不謬哉我故曰軒岐沒而醫道亡仲師死而真傳絶洵不誣也醫門經論神農本草曰本經黃帝靈樞素問曰內經皆聖經也仲景先師著卒病曰傷寒著雜病曰金匱此賢論也醫門聖經賢論猶儒者之五經四書也故醫門經論乃醫學正傳其餘難經脈訣及後人一切方書皆逐末亡本膚淺不經不可為訓何世之醫者於聖賢經論從未嘗讀即讀亦未解解未能明明未能用悲夫五運六氣天地至大人物至廣不外陰陽五行之理五運即五行也六氣即三陰三陽也故木火土金水曰五運厥陰少陰太陰少陽陽明太陽曰六氣五運合五行而六氣亦合五行天以此成四時而生萬物人以此成有形而合無形是五運六氣實醫學之根源神農本之而著藥性黃帝本之而著內經仲師本之而撰傷寒金匱今人但知風熱濕火燥寒為病豈知厥陰主風風木也少陰少陽主熱熱火也太陰主濕濕土也陽明主燥燥金也太陽主寒寒水也此風熱濕火燥寒之病而五運六氣即主之五臟六腑亦因之其本末不可不察也六淫外感六淫外感之説世多不得其解謂人外感天之六淫則為病而孰知其非也蓋厥陰少陰太陰少陽陽明太陽曰六氣風熱濕火燥寒曰六淫天有之人亦有之故居其內以通臟腑者六氣也居其外以通於天者六淫也天之六淫與人之六淫無時不感詎必病也天元紀大論云厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元由此例之則三陰三陽之六氣在下為標下即內也而風熱濕火燥寒之六淫在上為本上即外也六淫在上而在外故曰外感感猶通也故外感之説其義有二一言六淫外通於天一言六淫主外通於六氣義雖有二總謂六淫在人而不在天凡有所病皆本人身之六淫而非天之六淫也且獨不觀卒病論乎發熱汗出惡風脈緩者名為中風是中風之名從人身而定也或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名為傷寒是傷寒之名從人身而定也非外至也若果外至胡不曰六淫外中六淫外傷而必曰外感也世多不知此義一遇病輒云外感豈無病時遂不感耶甚矣其聵聵也七情內傷喜怒憂悲思恐驚謂之七情七情通於五臟喜通心怒通肝憂通肺悲思通脾恐通腎驚通心與肝故七情太過則傷五臟七情內傷則有所虧損療之不易也須識其何臟獨傷觀其色察其脈驗其形神詳其太過與不及而後調濟之其惟智者之能事乎臟腑經絡五臟為陰六腑為陽經脈為陰絡脈為陽臟腑經絡內經言之詳矣今總其要而言之五臟者三陰之所主也厥陰主肝少陰主心腎太陰主肺脾肝心脾肺腎木火土金水也肝木為風心火為熱脾土為濕肺金為燥腎水為寒是五臟合五運即有風火熱濕燥寒之六氣夫六氣與五運合者以少陰少陽二火而合五運也夫五臟有形形中有氣其氣通於六腑而行於經隧行於經隧則皮肌脈筋骨為五臟之外合如肺合皮脾合肌心合脈肝合筋腎合骨者是也通於六腑則五臟與六腑相為表裡如肺與大腸為表裡脾與胃為表裡心與小腸為表裡肝與膽為表裡腎與膀胱為表裡者是也此五臟之大概也若六腑則三陽之所主也少陽主膽與三焦陽明主胃與大腸太陽主膀胱與小腸夫膽與三焦少陽木火之氣也胃與大腸陽明土金之氣也膀胱小腸太陽水火之氣也此木火土金水火之氣乃合三陽而主六腑也夫六腑亦有形而形中亦各有氣其氣則內通五臟外行經脈所謂五臟有俞而六腑亦各有俞五臟有合而六腑亦各有合者是也此六腑之大概也夫三陰主五臟而厥陰不但主肝又主心包是手足三陰三陽為十二經脈十二經脈則胸走手而手走頭頭走足而足走胸其氣內通臟腑外通絡脈環周於身外通絡脈則合孫絡而滲皮毛內通臟腑則合經血而行榮衛所謂氣煦血濡流行不息者也今人不知皮肌經脈之淺深有卒病寒熱而涉於經脈者概以氣分之藥投之鮮克有效蓋經脈十二有三百六十五穴會有三百六十五經絡素問詳言之此經脈之大概也夫經脈之外更有絡脈絡脈之外復有孫絡故曰經脈為陰絡脈為陽蓋徑直而周於身者為經橫行而左右環繞者為絡十二經脈之外復有脾之大絡名曰大包又有任脈之尾翳督脈之長強合為十五大絡此大絡者出於經脈之外而有左右相注之奇病奇病者左病注右右病注左乃絡脈病也絡脈之病素問有繆刺之法以治之絡脈之外又有孫絡孫絡與皮膚相連在通體毛竅之內而胞中之血充膚熱肉淡滲皮毛經云孫絡之脈別經者亦三百六十五穴會又刺法云刺毫毛腠理者無傷皮知毛腠與皮分合之處則孫絡之脈在其中此因絡脈而及於孫絡之大概也三焦三焦者上中下少陽之氣所主也五臟合五腑三焦一腑無臟與合故曰是孤之腑也不但無臟與合而三焦之腑且將兩臟將猶偕也是以腑而並臟也不但將兩臟而六腑之氣俱合三焦故又曰是六腑之所與合者是三焦之氣合臟合腑徹上徹下徹外徹內人身莫大之腑也證之經論其理自明靈樞本俞論云肺合大腸大腸者傳道之腑心合小腸小腸者受盛之腑肝合膽膽者中精之腑脾合胃胃者五穀之腑腎合膀胱膀胱者津液之腑以明五臟合五腑其三焦一腑下屬腎上連肺將乎兩臟經云少陽屬腎腎上連肺故將兩臟謂少陽主三焦下焦將腎臟上焦將肺臟也雖將兩臟職不離腑故又云三焦者中瀆之腑也水道出焉屬膀胱是孤之腑也是六腑之所與合者由此推之則三焦為中瀆腑屬膀胱而出水道無臟與合是孤之腑也孤者獨也謂獨任其上中下之化機也既曰將乎兩臟又曰六腑與合是三焦一腑則較之諸腑而獨尊豈如一腑合一臟而已耶仲師云肌腠者是三焦通會元真之處榮衛不相將則三焦無所仰形冷惡寒者三焦傷也又云三焦各歸其部上焦不歸者噫而酢吞中焦不歸者不能消穀引食下焦不歸者則遺溲仲師之言即靈樞經所云上焦出胃上口中焦並胃中下焦別回腸注於膀胱而滲入者是也經又云上焦如霧中焦如漚下焦如瀆合觀經論則上脘中脘下脘即上焦中焦下焦也三焦所出之部即三焦所歸之部也三焦雖無有形之腑實有所出所歸之部抑且徹上徹下徹外徹內較諸腑而尤尊也昔人不體經論有謂三焦無臟空有名者有謂三焦屬命門有臟有名者各執臆説聚論不休觀諸經論其義自明有形無形可以悟矣命門五臟六腑合手厥陰心包則六臟六腑是為十二經脈其中並無命門之臟腑前人妄以三焦屬命門謬矣考之銅人圖有命門穴在脊十四椎腎俞間靈樞根結論有云根於至陰結於命門命者目也由此説推之則目之中央是為命門乃足太陽膀胱經脈之所結也腎俞中央是為命門穴乃足少陰腎臟之所通也腎為水臟膀胱為水腑而命門則通於水髒水腑之經脈焉氣血人之一身皆氣血之所循行氣非血不和血非氣不運故曰氣主煦之血主濡之氣與血無處不有今舉其概肺主氣乃周身毛皮之大氣如天之無不覆也經云宗氣上出於肺以司呼吸一呼一吸內通於臟故曰呼出心與肺吸入肝與腎又三焦出氣以溫肌肉膀胱津液隨氣化出於皮毛故曰三焦膀胱者腠理毫毛其應又六臟六腑為十二經脈榮氣行於脈中衛氣行於脈外由此觀之則五臟六腑十二經脈上下內外遊行環繞無非一氣周流而健行不息此人之所以生也然氣為主血為輔氣為重血為輕故血有不足可以漸生若氣不立即死矣夫人周身毛竅乃大氣之環繞於外而毛竅之內則有孫絡孫絡之內則有橫絡橫絡之內則有經焉絡與經皆有血也孫絡橫絡之血起於包中之血海乃衝脈任脈所主其血則熱肉充膚淡滲皮毛皮毛而外肺氣主之皮毛之內肝血主之蓋衝任之血肝所主也其經脈之血則手厥陰心包主之乃中焦取汁奉心化赤之血也血海之血行於絡脈男子絡唇口而生髭鬚女子月事以時下皆此血也心包之血行於經隧內養其筋外榮於脈皆奉心化赤之血也血海之血出多不死心包之血出多便死是又絡脈之血為輕而經脈之血為重也經云陽絡傷則吐血陰絡傷則便血此血海之血也一息不運則機針窮一絲不續則霄壤判此經脈之血也血氣二者乃醫學之大綱學者不可不察也水火水為陰火為陽水火之中火尤重焉蓋水者陰也陰不能生人必藉火之陽而後能生故水必藉火而後可飲谷必藉火而後可食夫在地為水在天為寒在地為火在天為熱陽熱之氣能生萬物若遇陰寒物必殺矣醫者於水火之中而知重輕之理則生者多而殺者少也陰陽經云陰陽者有名而無形數之可十推之可百數之可千推之可萬萬之大不可勝數試以大體言之則陽常有餘而陰常不足在天地則天為陽地為陰而天則包乎地之外在人身則氣為陽血為陰而氣實統乎血之先一歲三百六十日天日光明則三百日而有餘夫光明者陽也雨濕者陰也陽有餘而陰不足此其徵也人與天地相參與日月相應亦當陽氣有餘蓋陽主氣而陰主血如人陰血暴脫陽氣猶存不致殞命如陽氣一脫陰血雖充難延旦夕苟能於陰陽之中而知陽重於陰則遇病施治自有生機涼瀉殺人吾知免夫部位部位者頭面胸背脅腹手足各有所屬之部所主之位也頭為三陽之首三陽者太陽也自印堂至額顱上巔頂從腦下項皆足太陽經脈之部故曰頭為三陽之首也兩顴屬腎刺熱論云色榮顴骨其熱內連腎也兩目為肝之竅而五臟精華皆注於目故瞳神屬腎黑眼屬肝白眼屬肺內外眥肉屬心眼包屬脾兩鼻為肺竅而位居中央又屬乎脾鼻內口鼻交通之處則為頏顙又為蓄門乃肝肺相交之部也口為脾竅內外唇肉脾所主也舌為心苗齒為骨余而齒齦則為牙床又屬乎胃舌之下腮之內為廉泉玉英乃水液之上源也耳為腎竅又心亦開竅於耳胃足陽明之脈起於鼻交頞中循鼻外入齒中挾口環唇膽足少陽之脈起於目鋭眥上抵頭角循耳後入耳中出走耳前此頭面之部位各有所屬也頭面以下前有咽喉後有頸項喉居右咽居左喉為氣管而硬咽為食管而軟咽喉之中則為吭嗌吭嗌之上則為舌本舌本居下齶之盡而上齶之盡則有小舌所謂會厭也太陰脾脈絡舌本少陰腎脈絡舌本陽陰胃脈絡舌本咽喉之外則有動脈居乎兩旁所謂人迎之脈乃胃足陽明之脈也人迎之下鎖骨空處則為缺盆肺所主也又陽明經脈行身之前自面部而至胸膈皆陽明經脈所主也缺盆之下兩乳之上謂之膺中膺中之中謂之上膈即上焦也經云上焦開發宣五穀味熏膚充身澤毛若霧露之溉也上膈而下謂之膈中即胸膈也胸膈之間謂之膻中膻中即心包絡也心包主血主脈橫通四布包絡之下即有胃絡兩絡相通而橫布於經脈之間胸乃心主之宮城而包絡包乎心之外肺為五臟之長而蓋乎心之上心窩之下謂之中焦胃有三脘上焦之旁即上脘也中焦之旁即中脘也下焦之旁即下脘也頭面之下後有頸項項之中央名為風府項之兩旁名為風池項下高聳大椎乃脊骨之第一椎自脊骨而下至七節之兩旁名為鬲俞經云七節之旁中有小心以明鬲俞之穴乃心氣之遊行出入而太陽經脈行身之背此胸背之部位各有所屬也胸膈之下腹也胸膈下側脅也前胸後背而脅則居胸背之間行身之側脅之上為腋脅之下為季脅太陽行身之背而主開陽明行身之前而主闔少陽行身之側而主樞舍開則不能闔舍闔則不能開舍樞則不能為開闔是樞者乃開闔之關鍵也大腹名為坤土坤土太陰之脾土也大腹之上下脘之間為中土中土陽明之胃土也大腸名回腸盤旋於腹之左右小腸居大腸之前臍乃小腸之總結而貼臍左右乃衝脈所出經云衝脈於臍左右之動脈者是也臍之下則為小腹小腹兩旁名為少腹小腹者少陰水臟膀胱水腑之所屬也少腹者厥陰肝臟胞中血海之所居也血海居膀胱之外名曰胞中膀胱居血海之內故曰膀胱者胞之室也從小腹而入前陰乃少陰太陰陽明三經之屬經云腎開竅於前後二陰是前陰者屬少陰也經云前陰者宗筋之所聚太陰陽明之所合也又陽明主潤宗筋是前陰又屬太陰陽明也陰囊卵核乃厥陰肝經之所屬故經云厥陰病則舌卷囊縮舌卷手厥陰囊縮足厥陰也又云厥陰氣絶則卵上縮而終此脅腹之部位各有所屬也兩手兩足曰四肢兩手之上則有肘腋兩足之上則有膕髀兩肘兩腋兩膕兩髀名曰八溪從臂至手乃手太陰肺金所出而兼手少陰厥陰此手之三陰從胸走手也從足至股乃足太陰脾經所出而兼足少陰厥陰此足之三陰從足走胸也夫手足三陰三陽十二經脈交相通貫行於周身手之三陰從胸走手手之三陽從手走頭是手三陰三陽而循行於手臂矣足之三陽從頭走足足之三陰從足走胸是足三陰三陽而循行於足股矣此手足之部位各有所屬也靈樞十二經脈行於周身雖詳言之而醫未之悉也今舉其概而約言之手太陰肺脈起於中焦橫出腋下循臂內出手大指次指而交於手陽明之大腸大腸之脈起於手大指之次指循臂外入缺盆上面挾鼻孔而交於足陽明胃脈胃脈起於鼻頞中至額顱循喉嚨下膈挾臍入膝臏下足跗出足大指而交於足太陰之脾脈脾脈起於足大指上膝股之前入腹上膈連舌本注心中而交於手少陰之心脈心脈起於心中上肺挾咽出腋下循臑內抵掌骨出小指之內而交於手太陽之小腸小腸之脈起於手小指出手踝循臑外交肩上入耳中至目內眥而交於足太陽之膀胱膀胱之脈起於目內眥從頭下項脊循背膂下腿後至足小指外側而交於足少陰之腎脈腎脈起於足小指循足心上膕股貫脊上貫肝膈入肺挾舌本注胸中而交於手厥陰之心包心包之脈起於胸中循胸出脅入肘循臂過掌中循小指之次指而交於手少陽之三焦三焦脈起於手小指之次指循手臂出臂外貫肘上肩入耳中出耳前後至目鋭眥而交於足少陽之膽脈膽脈起於目鋭眥從耳後至肩合缺盆下胸中過季脅出膝循足跗出足大指而交於足厥陰之肝脈肝脈起於足大指叢毛之際從膕股而上過陰器抵小腹上入胸中而交於手太陰之肺脈是為十二經脈之一周乃頭面胸背手足各有所屬而為周身之部位也原病人身本無病也凡有所病皆自取之或耗其精或勞其神或奪其氣種種皆致病之由惟五臟充足六腑調和經脈強盛雖有所傷亦不為病若臟腑經脈原有不足又不知持重調攝而放縱無常焉得無病如臟氣不足病在臟腑氣不足病在腑經脈不足病在經脈陰血虛而不為陽氣之守則陽病陽氣虛而不為陰血之使則陰病且正氣內虛而淫邪猖獗則六淫為病是病皆從內生豈由外至其有外至者惟暴寒暴熱驟風驟雨傷人皮腠乍而為病則臟腑經脈運轉如常發之散之一劑可痊若先臟腑經脈不足而復外邪乘之則治之又有法必先調其臟腑和其經脈正氣足而邪氣自退即所以散之發之也所謂治病必求於本求其本必知其原知其原治之不遠矣治病凡人有病需治在醫醫者人之司命也既司人命必知人身有形之經又當知人身無形之氣辨有形之有餘不足察無形之離合逆從有形者臟腑經絡之定位無形者陰陽運氣之轉輸臟腑經脈有病而陰陽運氣轉旋輸布不失其常雖病可愈若有形既病而無形亦逆便不治矣蓋醫不能生人也不殺人便為良醫矣所痛惜者有形無形全不之知離合逆從並未曾曉見病即治知其外不知其內究其末不究其原妄曰醫者意也以妄為意以妄為醫是居盲瞶而云察秋毫也豈其然哉方藥品方用藥豈非醫之長技哉某藥合某方某方治某病輒取而用之父傳師授皆是術也夫立方如舉子作文隨題意而闡發無遺用藥如軍師遣將知敵情而因材器使經云視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分必如是而後可言醫若執方治病而不明五運六氣之本經脈生死之原概以為頭痛則散之發之而陽虛頭痛受其害矣脹滿則消之泄之而氣虛中滿受其害矣身熱則涼之而陽虛發熱受其害矣燥渴則寒之而津液內竭受其害矣仲師序云不念思求經旨以演其所知乃各乘家技終始順舊欲視死別生實為難矣由此觀之則成方不足重用藥實為難方技之醫盍改弦易轍而加之意乎嬰兒人稟天地陰陽之氣以生父母精血之形以成甫離胞胎腑臟之形未充陰陽之氣已立此形此氣賴乳為先間有小疾多屬本氣不和不宜妄投以藥即藥亦當調其本氣若概以發散消痰清熱之藥投之非惟無益反害之矣軒岐論醫言人身經脈循行之道血氣交會之理上下內外升降出入原無分於長幼數千年來正道無傳方技蜂起不知經脈血氣如何升降如何出入原本未明遂謂大人小兒當分科異治治既分則方科尋究方書兒科祕傳歌括昧昧昏昏毒流天下遇病輒曰點乳勿與詎知嬰兒之病輕者什九重者什一惟藉名醫知臟腑之原識陰陽之本按經投治以法救之耳今既絶其乳復以消散之劑投之病至輕者間亦自愈若氣血有乖而身熱脾胃內虛而生痰者遇此斷不能愈矣甚至痰益生則消益峻熱愈熾則涼愈投至死不變猶謂如是以治而病不愈無如何矣是則可嘆也已夫嬰兒者猶物之初生萌芽也腸細胃小藉有形之乳食養無形之氣機毋容絶也即曰乳食太過乍有壅滯須知一周不食胃亦空矣一劑消食滯已行矣平人飲食入胃傳化無停一日數餐次日皆傳道而出至飼乳小兒則隨食隨消傳化尤速若絶養胃之乳復投以戕胃之藥施於無病之兒亦病況已病乎即更辨曰小兒外感風寒內停乳食身發寒熱胸膈氣滿發散消磨且不愈奚可食哉而孰知其不然也風寒原非外感飲食本不內停但古先聖賢未經明言世何以知蓋人之一身有三陰五臟之氣三陽六腑之氣合十二經脈氣血流行外則從肌達表遍行周身以御外侮內則由臟至腑氣歸於胃以消飲食如曰外感則富貴之兒襁之褓之不出戶庭何以多感貧賤之兒受風受寒不避外邪何以少感受而不病則無外感不受而病實從內生矣如曰內停則無病之時頻頻食乳何不停食既病之後日日不乳何以停食若云初因停食而病至今未消試問人之胃腑何如者也食停於胃如此不消則胃之真氣已絶尚何容醫蓋在上脘者名曰宿食入於胃中即便腐化若上脘不清則點水必惡見食如仇何以抱病之兒渴欲求飲見食朵頤由此觀之則外感風寒內停乳食之説可廢矣方書詐無為有兒醫日殺生靈罪將奚歸天歟其不欲蒼生之環聚歟乃假其手於兒醫歟痘痘豆也形似也豆為腎之谷而痘之根源亦起於腎義同也人之結胎由父精母血而成是交感之淫火為痘之根源藏於腎者人之成形先有兩腎猶瓜實果種之兩葉痘之出也有循行之脈道從脈道而出為順不從脈道而出為逆脈道者何心包絡是也心包之絡主血主脈遍行周身其毒從陰出陽由下而上衝擊心包從心包而走經脈從經脈而出皮膚夫衝擊心包故必先發驚搐從經脈而出皮膚故續出而不驟從心包而走經脈故化血以成漿如是痘雖稠密亦必收功如不從心包之脈道而出則隨三焦之氣以走肌腠從肌腠而出皮膚為逆而險矣夫心包主脈脈者陰血也三焦主氣氣者陽氣也隨心包血脈而出則出之有漸化血為膿順之證也從三焦氣分而出則出之無漸不能化血為膿必至肉腫而痘不腫氣至而血不隨根窠不斂界限不分或扁大空倉或碎雜紫豔或陰寒灰白則為逆矣蓋毒走經脈則三焦和而為胃外之然自能進食如毒走三焦則三焦病而不能為胃外之然自不能進食故痘出順逆有一定循行之道醫者當靜以觀之不可妄投以藥若與藥便當泄腎毒而通經脈毒盛則先泄之毒不盛則導之引之使從經脈而出此為治之之法也苟不知此而處方投劑落方書之窠白大攻大涼非所以治之適所以害之也余為此言乃一定不易之理無甚奇也醫者不知人身經脈氣血之道陰陽交會之理見驚悸則曰心經痘咳嗽則曰肺經痘扁大則曰脾經痘紅潤圓綻則曰肝經痘灰紫不起則曰腎經痘於是攻發虛其肌表寒涼亂其經脈常見痘之密而順者遇兒醫而必重重則危危則死矣未聞痘之逆者遇兒醫而能收功者也嘗觀鄉村窮谷之中醫藥少有痘之生者常多省會城市之內醫藥最多痘之死者大半豈非治而致死之明驗歟瘄瘄猶錯也皮膚甲錯之謂也俗名曰瘄實系疹也紅點隱隱謂之隱疹疹之根源乃毫毛之內皮腠之間因於寒致血凝澀其凝澀之血散發於皮膚之外則發而為疹蓋人身通體毫毛之氣肺所主也毫毛之內腠理之外則秉胞中之血熱肉充膚淡滲皮毛肝所主也皮膚寒而血凝澀始焉凝澀繼欲流通則發熱咳嗽散而為疹疹之發也有稀少有稠密極稀少者不過數點以及數十點極稠密者則周身頭面無有空隙醫者不知其故見有數點即行攻發若皮膚肌腠之間果有凝澀則發熱咳嗽自當湧出其不能即出者非肌表不和即氣虛不振治之之法當以紅花歸芎荊柴羌丹之劑和其肌表或以桂枝耆朮歸芍苓甘之劑助其氣虛若概以蘇麻前杏芩連石膏之劑投之其氣虛不出者此為虛其原本本自稀少者此為無故受賊非惟疹不能出其經脈表裡受虧致身大熱而喘急生愈熱愈表愈喘愈發輕者重重者死矣蓋痘之發也見有一二點其勢必出疹之發也見有一二點可出可不出若肌表果有凝澀之疹則身熱咳嗽其勢自出若無疹則止此數點不能再增善治者明乎此理不行攻發但調其經絡和其榮衛虛者補之寒者溫之則熱退身安而愈無奈矇昧不明當疹毒盛行之時見有數點即行攻發轉攻轉劇愈發愈危必致真臟虛敗而死真可痛耳夫痘毒起於腎不從經脈而出為腎經痘雖有良醫不能挽回若疹則其根源在於肌腠皮膚膚腠之血根於胞中血海膚腠寒而胞血稽遲則有疹毒之證得其源而活法以治或聽其自然而不加妄治百無一死也附案己巳春長男甫六歲次男甫三歲於元旦次日俱發熱見疹余初不知疹之根源以為嬰兒生下時口含惡血開聲咽下其後發為疹毒治疹自當攻發即用清涼透發之劑服之次朝略增十餘點究不暢達心甚惶惑長男七月而生先天怯薄問其胸膈寬否何如答曰飢甚又問口味燥苦何如答曰淡甚因知其虛即投耆朮苓甘桂枝紅花一二劑次朝疹發遍身熱稍退而神情猶煩躁夜發熱頻咳嗽至一月方安蓋因見點之初過服表劑虛其經脈故也次男尚幼未省人事不能致問上冬患肺風痰喘證諸藥不效服麻杏桂枝石膏湯一劑而痊謂其稟質略強不與長男同其疹不透必寒凝毒甚因與蘇麻前杏黃芩石膏藥紅點不增又與紫蘇蔥薑芫荽等熏之尉之疹總不出乃與同道諸公商之俱云舍透發並無別法至五日而口吐蛔蟲兒醫曰此熱極蟲生余有牛黃散可與服之牛黃散即大黃末也一服痰喘止而神氣稍平自是此兒遂無言矣計無可施復針百會穴其喑門服西黃分許及諸單方觀其形證實不能生友人張衛生來望因曰此大虛大寒證也今既無言又不能食恐無濟矣然心猶不忍勉投參附含藥而亡因自嘆曰此庸醫現身食報天理當然自身行醫何尤乎人因悔昔日所見之皆非益信治病求本之不謬次日有同居甥汪姓者伊子出瘄已經三日見余際悲傷不邀診視自用前杏麻黃石膏藥一二劑疹出二十餘點不能再增心胸煩悶不得已而告余乞余診視余曰若再攻發即如吾子矣急與耆朮芎歸桂苓紅花等服一劑而熱退身安余自此始悟疹之根源凡治疹但調其氣血和其經絡寒涼攻發概置之不用所以屢治而屢效也次年春友人吳題仙之子甫二歲出瘄延兒醫馬聖則兄診治之攻發不透神情恍惚喘急不寧又延余診視余往吳宅聖兄先至余視之知其虛也因告主人曰若但發瘄瘄斷不出必至身命不保主人曰為之奈何余曰惟有溫補藥一劑益其臟腑安其腸胃助其氣血方可聖兄曰吾治四朝不能透發悉聽尊裁余即與耆朮薑桂歸芍苓甘銀花紅花諸味一劑而安次日仍用原方加人參一錢此後並不服藥連服獨參湯數日霍然矣又有夏姓耀如之子出瘄其顏色紫黯神氣不寧余曰此證大凶治須得法連看二次皆用溫散藥次早其家人來告曰口吐蛔蟲另有藥否余曰昨藥二劑俱服否耶曰尚存一劑因與附子八分令入藥內煎服自此遂無音耗越三載至其家見其子長大余因問曰昔年出瘄吐蛔何由得愈其家答曰服先生之藥後因無力相延仗天覆庇得以漸愈余默嘆曰因死吾子得生他人治疹之法可無憾矣余因附載斯册雖不能見信於兒醫而正道闡明實有裨於兒科治疹之根源而為有子出瘄者所當致慎也夫傷寒傷寒一名卒病卒暴也陰陽不和卒暴為病凡惡寒發熱頭痛骨疼嘔吐煩渴皆傷寒也因內傷而傷寒者病之至重者也內傷傷寒有性命之虞治法一以溫補元氣為主不效更當大溫補毋發散虛其經脈毋消導耗其中土毋寒涼損其陽和雖有外證必察其內察內者探本澄源之大道舍輕從重之至理也如是十全其七若妄加消散不愈然後溫補藥不純正方不畫一旋消旋補倏涼倏溫如是十死其七夫傷寒大病也而世醫施治之法無非消散寒涼病可一二劑而愈者必至於十數劑始為發散繼則消磨終則攻下原本壯實而病在三陽者其身或不死身雖不死而耽延時日狼狽已極矣且人以胃氣為本若病傷寒更以胃氣為先世醫不明此理凡遇傷寒必曰內有食也夫食為養命之本有食何妨況無病則能食有病則不能食無病則嗜食有病則惡食惡食而不能食不可強與若飢而欲食便當與之如必曰不可食也復投消食寬胸捱磨攻下之藥人豈金石哉夫食入於胃隨食隨消若有停滯自然不寧即當嘔吐仲師傷寒論云宿食在上脘者當吐之由此觀之則在上脘是為宿食若歸中脘便腐化傳導無宿食矣病人數日不食豈復有宿食之理若胸膈脹滿按之而痛非上焦虛寒即氣機不轉當益其氣機溫其三焦正氣流行則胸膈舒暢粗工不知亦曰有食如果有食何以始病之時按之不痛既病之後數日不食按之反痛按之而痛真氣虛也奈何妄行消導以為積垢內停欲使便出屢屢攻下豈知腸胃內虛所下者不過溏泄稀糞耳夫攻下便稀是腸虛也而又不知尤必曰此旁流也嗟嗟旁流二字論中並無即有旁流必燥糞內結而旁水自流非登廁便稀之為旁流也夫宿食旁流之證或百中有一豈可視為常事哉世之治傷寒者惟散惟消惟清惟泄不顧其本但治其末消散清泄殆盡見病虛寒然後調補執一定不移之死法治變化無方之傷寒捨生機活潑之至道用殺伐刀鋸之慘刑能不悲哉故治病必求於本而傷寒治本之法難以言傳識六氣之標本明經絡之淺深更合經論而會通之其庶幾乎發熱寒為陰熱為陽發熱陽也由陰氣不和於陽而發熱也夫陰氣不和於陽是為陰虛然陰在內為陽之守陰虛則陽無所守陽無所守則陽氣亦虛是發熱有屬陰虛者有屬陽虛者陰虛發熱宜養血滋陰陽虛發熱當養氣助陽人身陰陽和則無熱陰陽不和則發熱揆其常理但當和陰陽調氣血也然而熱之發也有微暴不同微熱者熱而和緩陰血內虛也暴熱者熱之燔灼陽氣亢害也陰血內虛而熱當以滋養之藥治之陽氣亢害而熱宜以溫熱之藥治之蓋微熱者有根之熱也熱暴者無根之熱也無根之熱是為脫熱脫熱者陽氣外脫而熱也如是之熱當求其屬以衰之故曰甘溫除大熱也凡病而發熱者什之九是身雖發熱必有本證醫者當視其色診其脈察其表裡揆其虛實合本證而詳論之得其要矣惡寒熱陽氣也寒陰氣也惡寒者周身毛竅不得陽氣之衛外故皮毛嗇嗇然而灑淅也人周身八萬四千毛竅太陽衛外之氣也若病太陽之氣則通體惡寒從頭項而至背膂太陽循行之經也若病太陽之經則其背惡寒惡寒之外又有身寒身寒者著衣重復而身常寒乃三焦火熱之氣不能外溫肌肉也傷寒論云形冷惡寒者此三焦傷也形冷惡寒即身寒之謂也凡傷寒初起身必發寒蓋寒乃太陽之本氣也經云太陽之上寒氣主之是太陽以寒為本以熱為標也惡寒之外又有惡風經云厥陰之上風氣主之人身通體皮毛太陽之氣所主也皮毛之內肌腠之間則有熱肉充膚之血厥陰之氣所主也病太陽之本氣而皮毛不利則惡寒病厥陰之本氣而肌腠不利則惡風風寒難以分別從皮毛肌腠而有別也病在皮毛則皮毛閉拒而無汗病在肌腠則皮毛開發而有汗蓋凝斂閉拒則為寒鼓動開發則為風風也寒也皆正氣內虛而淫氣隨生也有身雖發熱發熱之中仍兼惡寒法當辛溫以治其熱經云病未反本治當從本此之謂也頭痛頭痛之證有三一太陽頭痛一少陽頭痛一厥陰頭痛太陽之脈上額交巔絡腦而太陽之上寒氣主之太陽頭痛寒痛也少陽之脈上抵頭角而少陽之上相火主之少陽頭痛火痛也厥陰之脈上出額與督脈會於巔而厥陰之上風氣主之厥陰頭痛風痛也頭痛雖有寒火風三者之異尤當觀其微劇察其陰陽身有他病而兼頭痛痛之微者也獨患頭痛其痛欲死痛之劇者也凡陰血虛而陽熱盛則痛微若陽氣虛而陰寒盛則痛劇風火頭痛有餘則清散之不足則滋補之陰寒頭痛乃陰盛陽虛所謂陽虛頭痛者是也非桂附參耆不能治之世遇頭痛之證便謂外受風寒即與發散發散不愈漸加寒涼非芎防荊羌即芩連梔膏風火頭痛而遇此不致喪身若陽虛頭痛而遇此必致殞命矣可不慎哉世有三陰無頭痛之説豈知陰虛頭痛純屬陰寒陽幾絶滅病此者十無一生所以然者一如日不麗天下沉於海萬方崩陷也蓋人與天地相合天有日人亦有日君火之陽日也地有四海人亦有四海頭為髓海胸為氣海胃為谷海胞中為血海在天之日晝行於天夜行於海在人之日既行於天亦行於海自頭項至尾閭如日之行於天也自血海至髓海如日之行於海也今陽虛頭痛乃陰寒蔽日逆於髓海不能上巔至項以行於背反從陽入陰以行於腹是以頭痛不已則心煩心煩者陽光逆於氣海也心煩不已則嘔吐嘔吐者陽光逆於谷海也嘔吐不已則神昏神昏者陽光逆於血海也頭痛至神昏則入陰之盡如日沉海底矣在天則萬方崩陷而大荒在人則陽光絶滅而身死不知其源妄投湯藥至治之不效有云肝風入腦者有云客寒犯腦者有云真頭痛者其言如是而散風散寒之藥終以不免豈知散之之法非所以治之適所以害之旨哉靈樞四海論云得順者生得逆者敗知調者利不知調者害其即日逆於海之頭痛而醫者倒行逆施不善治而致死之謂歟辨舌舌者心之竅心火也舌紅火之正色也上舍微胎火之蘊蓄也此為平人之舌色若病則君火內虛胃無穀神舌色變而胎垢生今人妄謂胸中有食則舌上有胎非理也若謂胎因食生則平人一日數餐何無胎若謂平人食而即消病則停滯胎生何初病一二日舌上無苔至三四日穀食不入舌反有苔則有食有苔之説可知其訛謬矣方書辨三十六舌張大繁言毫無徵驗世醫不知此屬偽言臨病施治執以為信非所以救之適所以害之矣夫平人之舌本無苔微有苔者不過隱隱微微淡白淡黃之間耳惟三焦火熱之氣為寒所侵則舌上白苔而滑身發熱而谷不入中上二焦虛熱相蒸則舌上黏苔而垢苔色淡黃或微黃者中土虛也苔色灰褐或醬板色者中土寒也舌上紫色者虛寒也深紫色者大虛大寒也紫色光亮者久病火衰土無生原也淡白光亮者久病陰虛榮血內脫也苔色黑色者君火虛衰水色上乘也須知舌者火也火得其色乃為平人之舌平人五火齊明如天日光明陰翳消除何苔之有惟傷寒大病君火不明至三焦相火乘於君火之位則舌色反常夫相火之乘於君火也非相火之有餘乃君火之不足醫者不知救助君火之不明反汩沒相火之上乘進以寒涼則君火愈虧相火併竭神志散亂未有不斃平人胃氣有餘三焦和暢君火光明凡五味入口無論酸咸甘苦皆過而無苔病則胃氣空虛三焦失職君火衰微若五味入口遇酸咸甘苦則舌上凝滯而苔生矣人不之信但觀小兒服藥舌上藥色凝而不退大人食酸舌苔即黑此其徵矣夫黑者水色也傷寒苔黑世有火極似水之説品方用藥仍議清涼夫火極似水所謂物極必反也既極而反理應從治不應對治對治固宜清涼從治則宜溫熱矣奈何認舌皆以虛為實以寒為熱不能探本澄源盡是以訛傳訛雖謂舌色反常亦有實熱之證然舌色反常而實熱者十有二三此三陽病也舌色反常而虛寒者十有七八此三陰病也舌色反常上有紅點大如芥子此虛熱舌也舌色如常上有紅點大如芥子此實熱舌也舌上苔黑而熱極者其苔高浮於上不傷舌之本體或黑或灰此犀角芩連石膏之證乃百中之一耳至大小承氣之證舌上亦有燥黑者然必出言壯厲神氣雖昏而原本之神凝聚於內承氣下之而愈亦百中之一耳其有散黑而潤四邊灰紫者虛寒舌也又有凝黑而枯上如鱗甲者大虛大寒舌也並宜參朮桂附大忌寒涼若胃氣已絶滿舌如繭板硬而黃或板硬而黑如是之舌百無一生余之辨舌不合方書觀者未必能信如能不棄余言則殺人亦差少耳咳嗽語云諸病易治咳嗽難醫夫所以難治者緣咳嗽根本甚多不止於肺今世遇有咳嗽即曰肺病隨用發散消痰清涼潤肺之藥藥日投而咳日甚有病之經脈未蒙其治無病之經脈徒受其殃至一月不愈則弱證將成二月不愈則弱證已成延至百日身命雖未告殂而此人已歸不治之證矣嗚呼本屬可治之病而壞於凡醫之手舉世皆然莫可如何余因推本而約言之素問咳論云五臟六腑皆令人咳非獨肺也是以咳病初起有起於腎者有起於肝者有起於脾者有起於心包者有起於胃者有起於中上二焦者有起於肺者治當察其原察原之法在乎審證若喉癢而咳是火熱之氣上衝也火欲發而煙先起煙氣沖喉故癢而咳又有傷風初起喉中一點作癢咽熱飲則少蘇此寒凝上焦咽喉不利而咳也或寒或熱治當和其上焦其有胸中作癢癢則為咳此中焦津血內虛或寒或熱而為咳法當和其中焦此喉癢之咳而屬於上中二焦也若氣上衝而咳是肝腎虛也夫心肺居上肝腎居下腎為水臟合膀胱水腑隨太陽之氣出皮毛以合肺肺者天也水天一氣運行不息今腎臟內虛不能合水腑而行皮毛則腎氣從中土以上衝上衝則咳此上衝之咳而屬於腎也又肝藏血而沖任血海之血肝所主也其血則熱肉充膚淡滲皮毛臥則內歸於肝今肝臟內虛不合沖任之血出於膚腠則肝氣從心包以上衝上衝則咳此上衝之咳而屬於肝也又有先吐血後咳嗽者吐血則足厥陰肝臟內傷而手厥陰心包亦虛致心包之火上克肺金心包主血主脈血脈內虛夜則發熱日則咳嗽甚則日夜皆熱日夜皆咳此為虛勞咳嗽先傷其血後傷其氣陰陽並竭血氣皆虧服滋陰之藥則相宜服溫補之藥則不宜如是之咳百無一生此咳之屬於心包也又手太陰屬肺金天也足太陰屬脾土地也在運氣則土生金在臟腑則地天交今脾土內虛土不勝水致痰涎上湧地氣不升天氣不降而為咳咳必兼喘此咳之屬於脾也又胃為水穀海氣屬陽明足陽明主胃手陽明主大腸陽明之上燥氣治之其氣下行今陽明之氣不從下行或過於燥而火炎或失其燥而停飲咳出黃痰胃燥熱也痰飲內積胃虛寒也此為腸胃之咳咳雖不愈不即殞軀治宜消痰散飲此咳之屬於胃也夫痰聚於胃必從咳出故咳論云聚胃關肺使不知咳嗽之原而但以清肺消痰疏風利氣為治適害也已外有傷風咳嗽初起便服清散藥不能取效者此為虛傷風也最忌寒涼發散投劑得宜可以漸愈又有冬時腎氣不足水不生木致肝氣內虛洞涕不收鼻竅不利亦為虛傷風亦忌發散投劑得宜至春天和凍解洞涕始收鼻竅始利咳嗽大略其義如是得其意而引伸之其庶幾乎咳嗽俗名曰嗆連咳不已謂之頓嗆頓嗆者一氣連嗆二三十聲少者十數聲嗆則頭傾胸曲甚者手足拘攣痰從口出涕泣相隨從膺胸而下應於少腹大人患此如同哮喘小兒患此謂之時行頓嗆頓嗆不服藥至一月亦愈所以然者周身八萬四千毛竅太陽膀胱之氣應之以合於肺毛竅之內即有絡脈之血胞中血海之血應之以合於肝若毛竅受寒致胞血凝澀其血不能淡滲於皮毛絡脈之間氣不煦而血不濡則患頓嗆至一月則胞中之血一周環復故一月可愈若一月不愈必至兩月不與之藥亦不喪身若人過愛其子頻頻服藥醫者但治其氣不治其血但理其肺不理其肝頓嗆未已又增他病或寒涼過多而嘔吐不食或攻下過多而腹滿泄泄或表散過多而乳腫喘急不應死而死者不可勝計嬰兒頓嗆初起但當散胞中之寒和絡脈之血如香附紅花川芎歸芍之類可用其內寒嘔吐者乾薑吳萸可加表裡皆虛者耆朮參苓可用因病加減在醫者之神明苟不知頓嗆之原而妄以前杏蘇芩枳桔抱龍丸輩清肺化痰則不可也瘧瘧之不同於傷寒也瘧為輕傷寒為重瘧在經絡傷寒在氣化氣化者隨六氣而化病有陰陽之傳變也經絡者瘧邪隨經絡而沉以內薄由衛氣應乃作也應者衛氣外出瘧從之而發衛氣內入瘧從之而休也時行傳染之瘧邪瘧也邪氣相感但在皮膚絡脈間即不服藥三日亦愈其先寒後熱熱時煩渴汗出即休此三陽瘧也即不服藥六日亦愈又日發而早其瘧將愈日發而晏其瘧難已晏者衛氣虛而循經不入也瘧有陰陽輕重之不同瘧為陽脾寒為陰瘧為輕脾寒為重時俗一概混稱醫家一概混治豈知瘧與脾寒之不同哉瘧不死人脾寒能死人若脾寒病而概以消散寒涼之藥昧昧以治斷未有不斃者也夫病之發也寒少熱多六脈均平能食而神氣如常者瘧也寒多熱少六脈微虛不能食而煩悶嘔逆神氣消索者脾寒也夏月皮毛開發經絡外溢風暑之邪易傷經絡故多瘧病傷絡者瘧之輕者也傷經者瘧之可輕可重者也治瘧之方當調其氣血和其榮衛疏其絡通其經察寒熱之多少辨臟腑之虛實而施治之欲調氣血和榮衛如歸芍紅花柴胡桂枝可用也疏通經絡如續斷木通秦艽銀花可用也寒多者薑桂曲朴以溫之熱多者柴芩知葛以清之實者橘半枳朴虛者耆朮甘苓此瘧病通治之法也若干太陰脾臟則為寒瘧寒瘧猶脾寒也少陰心臟則為心瘧心瘧猶疸瘧也少陰腎臟則為腎瘧腎瘧猶牝瘧也厥陰肝臟則為厥瘧厥瘧厥不知人也此數瘧者當用參耆朮薑桂附以治之惟心瘧屬手少陰不宜溫熱當用參苓歸芍枸杞棗仁遠志龍眼補心養血之法以治之此五臟三陰瘧實可生而可死凡此所以論瘧病之重輕及治瘧之常法也而瘧之方起瘧之變病治之禁忌藥之流通更當悉焉夏月天暑地炎無寒風之外感然而沐浴水寒暮夜涼風不能無也人犯之者不在皮膚多傷經脈人身衛氣夜入於陰日出於陽因衛氣之出而乍然寒熱即瘧病也若昧昧以診見有寒熱不曰傷寒即曰傷暑不曰中暑即曰內傷外感夫其言如是而所用之藥無非發散消食及乎寒涼而已嗟嗟如是之病不遭如是之藥雖然成瘧七日可愈今也發散虛其表消食損其中寒涼滯其經而又絶其谷必至瘧不成瘧傷寒不成傷寒汗雖出而身不涼至日晡而熱更甚須知日晡熱甚原病瘧也汗出不涼表裡皆虛也無力之家不延醫不服藥進以糜粥挨延時日而愈有力之家屢屢更醫察其根由醫必曰虛之極矣先以人參少許探而試之試之相宜則重用之然後進以糜粥亦延挨時日而愈如是之病夏月頗多明者視之深為嘆惜而醫與病家總不知也然延挨而愈者什之八九其告殂者豈無一二言念及此寧不悲哉又有炎暑之時其人卒然厥逆色蒼蒼如死狀人必駭曰此痧發也放痧出血以救一時之困數日之後轉而為瘧詎知厥逆若死非痧也乃邪盛於經經脈一時不能交接即瘧之兆端始發也徒刺其血後必病瘧瘧亦不輕然此瘧乃發於經脈之陽者更有一時暴厥厥不知人刺之無血牙關緊急醫見之不曰急痧即曰中風入臟刺指無血則用鋒針刺曲池委中以出其血牙關不開則以銅箸撬齒灌礬水而探吐時余始蘇精神委頓六脈微虛一日稍平次日復厥厥而無熱微微有汗此瘧從陰出不得陽熱之化乃厥瘧也余於夏日曾治一二其後亦愈若既蘇之後投劑不宜亦不能生此瘧之方起為然也若瘧之變病總由攻消太過三焦內虛或脹滿或浮腫或泄瀉或咳嗽病雖有變更當溫其中土助其三焦若脹滿者消之浮腫者散之泄瀉者通之咳嗽者清之一時暫松不能全愈耽延時日斷未有不斃者也治瘧禁忌一發散二消食三寒涼前已言之矣至藥之流通今人治瘧不用常山以常山為截瘧藥截之早其後必變臌脹不觀仲師治瘧每用蜀漆蜀漆常山苗也苗不可得而用其根亦何害焉況常山乃從陰出陽之藥若三陰瘧脾寒病不使從陰出陽何能即愈既愈矣又何臌脹之有又瘧病虛寒久用參朮薑桂總不能愈者參朮薑桂之內須加常山更須加穿山甲使經絡疏通瘧邪外出未有不愈者也又陽熱之瘧鱉甲可以攻散心腎之熱瘧菖蒲黑豆可以交通邪入郛郭檳榔草果可以泄之邪入膀胱車前滑石可以利之若瘧後發咳乃初因瘧病地氣不交於肺今瘧止病去則地氣上升脾肺始交故咳苟不助脾氣之上升而反用泄肺之藥以下泄其咳斷不能除轉為瘧怯至五年而必死嗟嗟醫之為道至精至微粗工凶凶方技自逞收一時之小效至後死而弗計哀哉暑經云在天為熱在地為火暑者熱火之氣也天有此熱火之氣人亦有此熱火之氣無分四時寒暑凡病三陽而見熱火之證皆可言暑是寒也暑也即陰陽之氣也今人不明人身運氣之理遇炎天酷暑之病不曰傷暑即曰中暑香薷石膏竹葉芩連概投混施其殺人不知幾許矣夏月之時世人盡知有暑用寒涼之藥人皆曰宜也服之不愈則更服之更服不愈則頻服之雖至於死亦無怨言若遇明者洞鑑其源投以溫藥人皆曰不宜也服之不效必不再服其心皇皇曰此暑病也可服熱藥乎清涼之藥恣意投之厥身已斃仍咎熱藥之非則夏月寒涼殺人所必不能免者夫不能免而欲求其免其在芻言之可聽乎蓋暑者四時之一氣也暑何害於人哉如暑而必傷人也則長夏之時盡人當病何以烈日中奔走勞形者不病而避暑於高堂大廈者反病耶須知人病皆其自取吾身五運安和六氣均平雖日在暑中而不病若五運有虧六氣不振陰虛則陽盛而熱證生陽虛則陰盛而寒證起寒病暑病隨人身陰陽之氣而化生者也如寒邪傷陽而化病寒亦為熱暑邪傷陰而化病暑亦為寒苟不以人身氣化之寒暑為憑而以天氣之寒暑為定真殺人不用刃矣且夏月之時人身上熱下寒一如天氣雖暑地下則寒不觀井中水冷之極乎人身丹田之氣地下之水亦若是也凡治病者必顧其本惟夏月之病當溫補者什之七八宜涼瀉者什之二三凡人腎氣有餘形體不勞但感風暑化為熱病則香薷白虎一劑而痊西瓜涼水服之而愈醫見其痊愈也遇暑邪入臟之證亦以此藥治之則一劑而殂者比比矣酷暑炎炎朝病夕死人謂疫氣流行而死者皆因暑邪入臟病也其病五六日而死者亦因陽氣盡泄於外穀氣不入腎氣有虧真氣內脫而死也如是之病惟參耆桂附可以療之療之而盡人皆愈也人或信之療之而間有一二不及療者人必疑之而非之矣余嘗思子産論政云夫火烈民望而畏之故鮮死焉水弱民狎而玩之故多死焉今人畏熱藥而喜寒涼又何怪乎其多死哉戒人當暑月中須知兼雜虛寒之證不可恣意涼散然言之未免太過讀者當識其大旨勿以辭害意可耳痢痢瀉也大便通利常也痢者乃里急欲利復後重而不利後重即後墜痢之發也身作寒熱嘔吐煩悶水漿不入腹痛下痢或赤或白或赤白相兼裡急後重晝夜數十餘次此痢之重者也治得其法雖重可愈初起時若有風寒表證於治痢藥中當加發散若不發散徑治其痢必亂其經脈逆其氣機病轉劇矣外邪既去但治其痢更分寒熱虛實顧本顧標如但以通利之法治之先通後補不若標本兼治補瀉並行之為得也若下痢純紅身熱不退水穀不入是為死證經云腸澼下血身熱則死謂余血下泄陽熱外浮陰陽離脫也若痢後下血水其身發熱亦為死證痢後則腸垢已竭下血水乃從陽入陰胞中並傷世有下屋漏水之説則血水其漸也若色如魚腦此熱毒入腸當清熱和血也色如醬褐乃下焦虛寒亦非善證當溫經散寒如白沫凍汁則為寒積世醫有赤屬火白屬寒之説於理亦似但赤色而中土虛胃氣弱者當用溫藥以從治不宜涼藥以對治也凡痢初起作嘔無害若日久脾虛三焦寒而嘔者亦將危矣又凡下痢必痛痛者可治謂有積也不痛者是為腎泄難治一起便宜溫補不宜行泄若行瀉於前溫補於後亦難生矣凡痢屬三陽精神不憊而能食者當分新久或瀉或補或瀉補兼施若身體疲倦不能飲食而屬三陰者止宜溫補不宜通利亦有下痢無積日夜十餘次解時微痛是名脾瀉又名洞泄亦宜溫補不宜通利有脾家實而腐穢當下者乃新病為然必非久也有夏秋虛寒下痢治得其法至冬稍痊明春方愈者有夏秋實熱下痢治不得宜乍輕乍重至明春方死者有痢疾初起點滴艱澀裡急後重宜芒硝大黃通利者所謂通則不痛也痢之輕者名曰積飲食失宜寒積下焦也一時腹痛雷鳴暴注名曰水瀉水穀不分從小腸而下注也凡下痢有糞者輕無糞者重蓋糞從腸中出積從腸外出腸中出者出之易腸外出者出必難故後重而痛也喘喘者氣短而促吸不歸根呼吸之氣不應皮毛之開合也有實喘有虛喘有半虛半實喘實者風寒之邪傷其毛腠致肌表不和毛皮毛也主表腠腠理也主肌經云三焦膀胱者腠理毫毛其應是三焦應肝血之腠理以主肌膀胱應肺氣之皮毛以主表若寒邪凝斂於皮毛皮毛之氣不通於腠理則喘風邪中傷於腠理腠理之氣不通於皮毛亦喘然此喘也必病之初起微微氣急或無汗惡寒或有汗惡風斯時和其肌表散其風寒喘自平矣半虛半實者手足太陰之氣不相交合也手太陰肺金天也足太陰脾土地也地氣上升則天氣下降或寒逆於肺而肺金寒或濕滯於脾而脾土濕則脾氣不升肺氣不降痰涎在中上下不交而為喘然此喘也必兼咳也夫脾肺不交則為虛寒濕內凝則為實虛實相半則補瀉並施虛多實少則補多瀉少實多虛少則瀉多補少寒涼之藥在所禁也傷寒論中有麻黃杏子石膏湯葛根黃連黃芩湯以治喘乃病太陽之標陽而毛腠不通陽熱過盛病在氣化不在經脈也又有冷風哮喘乃胃積寒痰三焦火熱之氣然之不力火虛土弱土弱金虛致中有痰而上咳喘此緩病也亦痼疾也久久不愈致脾腎並傷胃無穀神則死矣至虛喘者水天之氣不相交接也肺天也腎水也天體不連地而連水經云其本在腎其末在肺以明水天一氣若天水違行則肺腎不交而喘治不得宜將離脫矣當用參苓耆術以補肺辛味桂附以補腎肺腎相交則喘平而能臥若上下不交晝夜不臥喘無寧刻則太陽標本之氣亦幾乎息矣蓋太陽以寒為本以熱為標寒本膀胱之水也氣根於腎熱標皮毛之陽也氣合於肺此肺腎不交而太陽標本之氣將以孤危前藥所以必需也若外道之藥消削於前其後亦無濟矣余曾以前方治半月之虛喘一劑而安舉家欣喜即以告余問前方可再服否余曰姑俟明日病家曰何也余曰安臥者肺氣下交子時一陽初生腎氣上行方為交合恐憊極而腎氣之不升也至寅時果死矣經云升降息則氣立孤危出入廢則神機化滅其即肺腎不交太陽氣絶之喘病為然乎厄世有厄證而經論有噦無厄寧後世言厄而古時言噦耶詩云鸞聲噦噦謂聲有節奏也人之發厄勻勻而來亦有節奏故經論之噦有作厄解厄之微者名曰噎厄有逆厄有虛厄有敗厄逆厄者膈中有寒胃氣從胸上膈膈寒其氣停止止而復出則厄也此膈寒氣逆而厄厄之至輕者辛散溫行數劑可愈若病傷寒而三焦不和胃中留滯上焦不能如霧之灌溉中焦不能如漚之腐化下焦不能如瀆之濟泌則上脘中脘下脘之胃氣亦因以不和三焦者胃外之然也今三焦火熱之氣內不和於胃外不達於肌蘊熱上衝發為逆厄斯時熱者清之寒者溫之正虛邪實者補而導之不虛但實者泄而通之平胃瀉心皆可用也張潔古治逆厄有丁香辛香暖胃柿蒂苦澀清涼是三焦鬱滯之厄相宜而虛厄敗厄不相宜也虛厄者人病傷寒絶其穀氣中胃空虛復加寒涼消導中胃既虛而三焦火熱之氣亦失其職陽明胃土不能合三焦出氣以溫肌肉寒氣凝滯正氣內虛則厄矣參朮桂附可以治之然必能食則可治不能食則不可治矣又有泄瀉下痢下焦虛寒谷入少而中上二焦亦虛而寒以致厄者亦為虛厄敗厄者病起於陰腎臟先虛不救其虛反以實治致胃腑亦虛於是戊癸不合火無生原發而為厄是為敗厄百無一生雖有參附亦徒然耳然虛厄不愈則轉為敗厄醫者又不可不知也嚏嚏非病也然而嚏所由來當知之也人身經脈十二始於肺之寅終於肝之醜而肝復交於肺如十二時之相繼無已也夫肺金也肝木也肝脈循喉嚨入頏顙究於畜門從畜門而上額循巔以下項若頏顙不利不能上循但從畜門出鼻則為嚏夫鼻為肺竅而畜門為肝穴嚏之有聲如撞鐘然猶以木擊金也平人之嚏間或有之乃畜門之氣一時滯而不上下出於鼻則嚏也又紙捻搐鼻則畜門頏顙為物所引而下脈本欲上今引之而下引下則嚏又肺主皮毛肝主肌腠風邪陡襲皮毛則皮毛之氣不通於肌腠肌腠之氣欲出於皮毛滯而不和則嚏又肝脈內虛不能循脈而上但留於頏顙畜門間則頻頻而嚏醫不知之以為肺病豈知實肝病也又時病將痊則嚏時病邪從外至由皮毛而入肌腠皮腠有病則經脈不通於皮腠嚏則流通而環轉也又大人小兒卒患厥證病在厥陰陰極而陽不生一時厥逆藉藥得蘇氣脈流通則嚏此從陰出陽逆而復順也方書治中風不知人者用紙捻或末藥搐鼻而曰有嚏則生無嚏即死吾不之解意者有嚏則經脈可通無嚏則經脈斷絶之謂歟脹腫脹氣機不利也胸上不寬謂之胸痹有脈不橫通而脹者有濁氣在上而脹者脈不橫通宜木通茜草麥冬栝蔞貝母之屬以治之此開胸痹法也濁氣在上宜柴胡廣皮木香桔梗半夏之屬以治之此升清降濁法也胸之下胃之上脹者乃胃絡與心包絡兩絡不通也宜鬱金紅花續斷丹皮枳實之屬以治之此調和氣血法也膈之下腹之上脹者乃胃土不和中焦腐化有愆胃有停滯土氣不達而然也虛則補之實則消之熱則清之寒則溫之審其寒熱虛實而治之乃通調轉運法也胃之下臍之上脹者乃脾土失職地氣不升而然也夫胃土屬陽明可清可消脾土屬太陰如坤之地發生萬物者也地氣上升然後天氣下降若地氣不升則天氣不降天地痞塞則萬物不生治之之法當壯火氣以生土助脾氣以交肺若謂脹無補法但以清涼消克之藥行之或見效於一時或不見效於一時而地氣終不上升則天氣何能下降無論效與不效終必死也若小腹脹者乃膀胱水氣不能合太陽而通於皮毛也或通其水道或開其毛腠若脹而兼腫小便不利者行其水脹而不腫小便如常者解其肌凡脹在上者欲其下而更有橫通之法脹在下者欲其上而兼有溫散之法所謂臟寒生滿病也若貼臍左右上下脹者脹必兼痛蓋衝任當臍合於氣衝之動脈衝脈逆而不舒故或脹或痛當以紅花歸芎柴胡桂枝解肌和血之法以治之若季脅兩旁兼少腹脹痛者乃厥陰之氣內不交於少陰外不合於少陽當以調和內外交通陰陽之法以治之所列藥味不過陳其大概或減或加神而明之可也脹未必盡腫而腫未有不脹者也人身外為陽內為陰通體皮毛太陽陽熱之氣也陽熱之氣轉為陰寒則太陽標陽不合少陰之本熱而少陰標陰反合太陽之本寒致太陽皮毛之氣不內通於少陰之骨髓水氣乘之則為水腫寒氣乘之則為寒腫風氣乘之則為熱腫若內臟無虧而蘊釀成熱則散之清之行之攻之亦有愈者若內臟空虛腎精竭乏不得其治則有性命之虞又腫而喘危之兆也治得其宜可以苟延治失其宜即便死矣吾見世之腫而死者十有八九而五子五皮方治之生者十無一二醫者能知太陽之標陽本寒而主皮毛少陰之標陰本熱而主骨髓太陽之本合少陰之標少陰之本合太陽之標從無形之氣化而旋轉以施治不從有形之邪水而攻下以為功庶乎其可耳蠱易曰蠱壞極而有事也人病蠱者脾土敗壞身不即死復有事也事猶病也腹脹而硬紫筋浮露臍平如鼓外徑內空毋論能食不能食總百無一生若但浮大而軟則將成未成是為脹滿猶可治也夫心肺之病其死也速脾土之病其死也遲人見其遲也而妄施湯藥以治之治之小愈非真愈也苟延時日而已善治者於始萌之日從其本原而治之不使敗壞成蠱醫之功也若已成而復藥之總無濟矣世有蠱證余無治法姑列其目以俟能者隔隔猶阻也阻隔不通不能納穀此三焦失職之病也上焦出胃上口主納中焦並胃中主腐化下焦別回腸主濟泌平人食谷從上脘而直入中脘上脘中脘即上焦中焦直入中脘便腐化矣經云上焦如霧中焦如漚下焦如瀆為胃外釜底之然若中上二焦火氣衰微上焦不能如霧之灌溉中焦不能如漚之腐化便不能消穀谷入反出矣患此病者百無一生但有中上中下之分速死遲死之異中上者上焦中焦不和也中下者下焦中焦不和也中下不和其死遲中上不和其死速然治得其宜速者可遲治失其宜遲者亦速矣初患此病醫者每用辛香行氣之藥謂能寬胸以開胃詎知不能食者真氣虛也真氣既虛豈可復行辛散以耗其氣乎既耗其氣元本不甚虛者猶可苟延其元本虛者數月之間身命便不保矣又初患此病醫者有用養血滋陰之藥謂開闌門而使之下可以不吐若系中下二焦不相通貫谷入中脘下焦不相順接腐化有愆仍從中脘而上逆逆則吐此滋潤下行之藥投之亦效愈而復發復投此藥便不效矣初因下焦不得順接可以滋潤下行久則陰盛陽虛下焦生陽之氣不能環復於上下而不上則不效矣不效必至身命不保矣其中上二焦火氣衰微初起或便用參耆朮薑桂附等藥服之亦覺有效藥雖效而病不除其後必疑溫補之非轉服他藥終歸不治天下豈有不食谷之人哉經云得谷者昌失谷者亡善夫吐血人之一生氣充於外血附於內陰陽和平榮衛通調何吐血之有惟大怒大勞或過思過慮傷其經絡逆其氣機致陰陽血氣失其循行之常度則血外溢而有吐血之病矣血雖同而血之根由不同有胞中血海之血有心包脾絡之血夫胞中為血海其血熱肉充膚淡滲皮毛若大怒大勞氣虛一時不能攝血致胞中之血不充於膚腠反從氣衝而上湧於胃脘吐此血者其血必多治之之法當調其榮衛和其三焦使三焦之氣和於榮衛榮衛之氣下合胞中氣歸血附即引血歸經之法也若不按經調治只期速效妄稱火盛血淫驟用清涼瀉火以止血不但血不能即止必增咳嗽之病矣夫吐血自有止期虛癆咳嗽必至喪身而後已其心包之血內包心外通脈下合肝合肝者肝與心包皆為厥陰同一氣也若房勞過度思慮傷神則吐心包之血吐此血者十無一生惟藥不妄投大補心腎重服人參可十全一二其有身體不勞內無所損卒然哈血數口或紫或紅一哈便出此為脾絡之血脾之大絡絡於周身絡脈不與經脈和諧則有此血下不傷陰內不傷經此至輕至淺之血不藥亦愈若不分輕重概以吐血之法治之致絡脈寒凝變生他病醫之過也又五臟有血六腑無血吐心臟之血者一二口即死吐肺臟之血者形如血絲吐腎臟之血者形如赤豆五七日間必死若吐肝臟之血有生有死貴乎病者能自養醫者善調治爾脾臟之血若羅絡即前哈血是也凡吐血多者乃胞中血海之血醫者學不明經指稱胃家之血夫胃為倉廩之官受盛水穀並未有血謂血從胃出則可若謂胃中有血則不可也衄血血從鼻出謂之衄衄之出也由陽明經脈之氣不循胃絡而橫通周遍致悍熱之氣傷其榮血遂迫血妄行而為衄若傷寒陽熱過盛絡脈寒凝榮衛不調身發熱者得衄則陰陽和而熱氣平其病可愈故俗稱鼻衄為紅汗也其有不病傷寒時出衄者乃陽明熱氣有餘不循經下行反上逆而傷其絡脈之所致也衄出則陽明亢熱之氣亦平故不藥亦愈此衄至輕者也又有陽明經脈虛寒其人秉質素弱內則耗其精血外則勞其形體衄大出不止用涼血滋陰藥其衄反甚者乃陽明陽氣失職必用人參附子補氣以攝血助陽以救陰其血方止此衄之至重者也欲辨衄之重輕須察衄之冷熱衄出覺熱者乃陽明絡脈之血輕者也治宜涼血滋陰衄出覺冷者乃陽明經脈之血重者也治當溫經助陽夫衄血之病雖屬平常若出而不止陰陽離脫亦有死者臨病施治常須識此不可忽也便血便血俗名腸紅血從大便出也或在糞前或在糞後但糞從腸內出血從腸外出腸外出者從肛門之宗眼出也此胞中血海之血不從衝脈而上行外達反滲漏於下用力大便血隨出矣此病初起人多不覺及至覺時而身體如常亦玩忽不治即或治之無非涼血清火暫止復發數年之後身體疲倦恣投藥餌總不除根遂成終身之痼疾矣痼疾雖成不致殞命其治法總宜溫補不宜涼瀉溫暖則血循經脈補益則氣能統血初便血時治得其宜亦可全愈若因循時日久則不能愈矣心腹痛心腹痛者上心下腹相引而痛痛之名雖同而所痛之部不同如堪輿移步換形其中不可不條分縷晰者也心為君主而藏神不可以痛今云心痛乃心包之絡不能旁通於脈則痛也心脈之上則為胸膈兩乳之間則為膺胸胸膈痛乃上焦失職不能如霧露之溉則胸痹而痛薤白蔞仁茜草貝母豆蔻之藥可開胸痹以止痛膺胸痛者乃肝血內虛氣不充於期門致沖任之血不能從膺胸而散則痛當歸白芍紅花銀花續斷木通之藥可和氣血而止痛有中脘作痛手不可近者夫手不可近乃內外不和外則寒氣凝於皮毛內則垢濁停於中脘當審其體之虛實以施治莫若以燈草火當痛處爆十餘點則寒結去而內外通便不痛矣有中脘之下當陽明胃土之間時痛時止者乃中土虛而胃氣不和若行氣消泄之劑服之過多便宜溫補但以手重按之則痛稍平此中土內虛虛而且寒之明驗也其乳下兩旁胸骨盡處痛者乃上下陰陽不和少陽樞轉不利也傷寒病中每多此痛當助其樞轉和其氣血上下通調則愈矣其大腹痛者乃太陰脾土之部痛在內而緩坤土虛寒也痛兼內外而急脾絡不通也蓋脾之大絡名曰大包從經隧而外出於絡脈今脾絡滯而不行則內外皆痛太陽篇云傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥者與小柴胡湯此先補益於內而後樞轉於外也其有臍旁左右痛者乃衝脈病也衝脈當臍左右若為寒氣所凝其衝脈之血不能上行外達則當臍左右而痛當用血分之藥使胞中之血通肌達表若用氣藥無裨也又有臍下痛者乃少陰水臟太陽水腑不得陽熱之氣以施化致陰寒凝結而痛少陰水臟虛寒當用桂附以溫之太陽膀胱水腑虛寒亦當用桂附以溫之蓋太陽少陰相為表裡互為中見者也又小腹兩旁謂之少腹少腹痛者乃厥陰肝臟之部又為胞中之血海蓋膀胱之水主於少陰而胞中之血主於厥陰也痛者厥陰肝氣不合胞中之血而上行也肝臟不虛者當疏通以使之上肝臟虛者當補益以助其上蓋厥陰不從標本從中見少陽之氣使厥陰上合乎少陽則不痛矣其兩旁季脅痛者肝氣虛也兩脅之上痛者少陽之氣不和也所痛之部有氣血陰陽之不同若概以行氣消導為治漫云通則不痛夫通則不通理也但通之之法各有不同調氣以和血調血以和氣通也下逆者使之上行中結者使之旁達亦通也虛者助之使通寒者溫之使通無非通之之法也若必以下泄為通則妄矣中風方書俱以中風辨首謂風為百病之長善行數變其中方治最多有真中風類中風之區別而熟知其不然也風者厥陰之本氣也在天為風在地為木在臟為肝人身肝血內虛木不條達外不充於經絡內不榮於臟腑則血虛生風而有中絡中經中腑中臟之不同實皆中風病也仲師金匱論中風歷節篇云風之為病當半身不遂或但臂不遂邪在於絡肌膚不仁邪在於經即重不勝此言風中於絡或中於經傷有形之經絡而為病中之淺病之輕者也若中風歷節則傷腎主之骨肝主之筋疼痛如掣此言風傷有形之筋骨而為病中之深病之重者也雖有淺深輕重之不同皆不死也又云邪入於腑即不識人邪入於臟舌即難言口吐涎此不傷有形之筋骨而傷無形之真氣中腑中臟皆必死矣但中臟者立死雖延三五日猶立死也中腑者腑與臟表裡雌雄相應或半月或一月腑氣不外通於經而內逆於臟亦死矣經云連臟則死連經則生不入臟而連經者所用之藥總宜強筋壯骨補血補氣如耆朮熟地歸芍參苓附桂等而祛風消散清涼豁痰在所禁也胎産胎産乃婦人生育之常非病也其半産漏下則為病矣半産者未滿十月而産俗云小産是也漏下者血不養胎離經下漏也未滿三月而漏者胎必不保以胎未成形其凝結之血即胎也血行恐胎亦不成矣至四五月而漏者其胎已成大補氣血不漏則安至於生産之後不過氣血兩虛謹慎調養必無他患或三四日之間其身發熱稍有微寒總因氣血暴虛陰陽不和之故服藥只宜補氣調血陰陽和而寒熱可愈丹溪云産後須大補氣血雖有雜證以末治之誠哉斯言若延醫診治見其身熱復有微寒必曰此外感也投以散寒清熱之藥不惟不愈變證日加證屢出則治屢更至身體憊極然後重用人參與其補於既變之後曷若無損於未變之先且有力服參者大半猶可挽回若無力服參不可保矣至産後惡露或多或少或有或無當聽其自然不可破氣行瘀有生産惡露無一點者其身無病亦無害也又産後腹痛多屬經脈不和中土虛寒但當調其經脈溫其中土破氣行瘀亦所禁也我故曰生産原非疾病服藥總宜溫補不揣其本而齊其末不若不藥之為得矣其婦人妊娠婦人産後婦人雜病已悉仲師金匱論中參究可也用藥大略余初事醫亦閲方書未讀本經只知某藥性寒某藥性熱某藥豁痰某藥行氣某藥燥濕某藥健脾某藥破血某藥補血遇病用藥如是而已及藥不應手嗜古而靈始知五運六氣之理天地有五運六氣人身亦有五運六氣而百卉草木亦莫非五運六氣五運五行也六氣亦五行也天地開闢草木始生農皇仰觀俯察而百卉草木有五方之出處五時之生成其中更有五色五臭五味而合於人之五臟六腑天地人物一以貫之著為藥性知藥之性則用之無窮取之有本後人不知其性但言其用是為逐末亡本如雲犀角解心熱羚羊清肺肝遇心熱之證宜用犀角肺肝之證當用羚羊使用之而毫不見功將如之何必知犀角之性如何所以清心熱者何故羚羊之性何如所以清肺肝者何故知其所以然之故則取之左右逢其源不知其故而硬用之是欲金之鳴而撞其木也雖撞不鳴不鳴愈撞愈撞愈不鳴即至折手不見成功何益哉藥性必分臟腑經脈升降出入或行皮毛或解肌腠或通經脈或起水土之氣上行或助金木之氣轉輸或秉鎮墜之質下降以藥性之運氣合人身之運氣而用之斯為有本茲未能悉底詳明姑以日逐所用數十品言之人參補五臟之真元五臟真元有一臟不足者即用之若水火不交心腎之真元不足也天地不交脾肺之真元痞塞也氣血不和陰陽之真元不濟也急用之猶恐無裨矣凡飲食不進胃口不開者必用人參蓋五臟六腑之氣俱至於胃猶江漢朝宗於海也有一臟一腑之氣不至於胃其人必不能食雖食亦勉強不多別藥補止一臟一腑獨人參備天地人三才之氣能補五臟六腑之元神故必用之其餘之用不可勝説若欲盡説罄竹難書善悟可耳黃耆助三焦之氣從經脈以達肌腠若三焦內虛不能從經脈而達肌腠者必用之白朮補脾土脾土虛者必用之類之山藥石斛米仁乾薑炙甘草皆脾土藥也其餘尚有運脾消導之藥不可勝紀矣五味子杜仲補骨脂巴戟天熟地黃皆補腎藥也陽氣立而陰精不足凡此可補然緩著也若腎精竭而陽無所附又宜桂附以補陽凡藥空通者轉氣機如升麻木通烏藥防己通草皆屬空通藤蔓者走經脈如銀花乾葛風藤續斷桑寄生皆屬藤蔓至不必藤蔓而入血分之藥亦走經脈如紅花當歸丹皮秦艽白芍之類胸膈不和在兩乳之上則川貝母桔梗茜草麥冬木通蔞仁主開胸痹凡胃絡與心包絡不相通貫致不能橫行旁達者此藥亦主之心氣不交於腎則桂枝茯苓棗仁枸杞可使心氣歸伏於下肝氣有餘而內逆則用元胡青皮五靈脂香附白蒺藜之類以疏肝凡藥有刺而屬金者皆主伐肝蓋金能制風金能平木制風平木即所以伐肝也肝氣不足而內虛則用山萸肉五味子熟地黃當歸白芍木瓜之類以補肝又水能生木補腎即補肝所謂虛則補其母也五臟調和六腑無恙或三焦火氣有餘陽明燥氣上熾少陽相火妄動則芩連梔柏凡瀉火清涼皆可用也若臟腑內虛而燥火上炎者又當和其臟腑或補瀉兼施不可專行涼瀉矣肺為五臟之長受朝百脈不宜有病其咳嗽之證雖關於肺而病根在於別臟別腑腑臟之氣不循經順行各上逆於肺而為咳也若咳果在於肺久久便為不治之證而肺經之藥通變無窮不可執一如杏仁桔梗桑皮白芥子麻黃紫蘇葶藶子皆瀉肺藥也百合款冬貝母人參五味子皆補肺藥也而補脾之藥亦所以補肺蓋足太陰屬脾土手太陰屬肺金土能生金故補脾即所以補肺也凡發散毛竅解肌出汗之藥皆所以瀉肺蓋肺主皮毛金能生水實則瀉其子故皮毛汗出所以瀉肺也其病在骨當用腎臟之藥桂附可用其病在筋當用肝臟之藥歸芍可用及前補肝之藥皆可用也病在肌肉當用補脾助土之藥病在經脈當用心包絡之藥病在皮毛當用肺經之藥其藥已載於前意會而神明之可也又痘證用藥方書俱有成法余獨體痘根所發之原而神解以治痘毒起於腎此毒一發合相火而上行故痘為水毒因火始發見點一二則知外有熱而內發痘經云榮主血衛主氣主血者合心主之包絡也主氣者合三焦之肌腠也如三焦氣虛見點一二火毒內熾一起便見狂煩不順則用大承氣湯乃釜底抽薪之治如錢氏百祥丸亦釜底抽薪之法也若無此證但觀其痘所循之路必令三焦之氣內合心包心包主血主脈見點不必發表第一要用經脈之藥使三焦之氣先合榮血而走心包如紅花續斷秦艽茜草當歸川芎生地銀花之類出之有漸顏色潤澤便當和其三焦調其中胃四五日痘根微有水色即宜助三焦而補氣血銀花歸芍茯苓黃耆人參甘草桑蟲如是而已此外之治皆不諳經脈不知自然之理而妄行施治者也此其大略也辨藥大略藥品浩繁不下千百餘種其尋常日用者不過百十種而百十種之中藥有真偽好惡用有宜與不宜皆當明辨而詳悉者也如赤芍藥銀柴胡赤小豆龍骨巨勝子半夏曲皆偽藥也本草崇原俱已辨明但未梓行茲且言之芍藥花開赤白赤花者為赤芍白花者為白芍總屬一種豈有二耶今兒科外科多用赤芍謬矣又以白芍為酸斂之藥豈知本經主治邪氣腹痛除血痹破堅積寒熱疝瘕氣味苦平性功如是寧酸斂耶試將芍藥咀嚼酸味何在可以正其誤矣柴胡有硬軟二種硬者為大柴胡軟者為小柴胡然必出於銀州者為勝故有銀柴胡之名非大小柴胡之外復有銀柴胡也赤小豆穀類也粗而大者為赤豆細而小者為赤小豆今藥肆中一種草子赤黑相兼不可煮食豈得謂之豆乎巨勝子即胡麻也出於胡地之大宛者為勝故有巨勝之名劉阮誤入天台仙家飼以胡麻飯即巨勝子也今藥肆中一種有殼無仁乃狗蝨也以狗蝨而充巨勝妄立壁蝨胡麻之名今用巨勝子不若竟用大脂麻矣龍骨本經上品之藥乃上天所謫之龍海濱深山間或有之今一種龍骨者乃北地深山之石壟骨而非上天所降之真龍龍為陽物能興雲布雨故傷寒論中發汗名大青龍利水名小青龍今欲止汗反用龍骨豈理也哉本經言止汗者乃以真龍之骨研為細粉撲其周身塞其汗孔即本論以溫粉撲之之義非服食止汗之謂考神農本經止有半夏並無半夏曲今藥肆中以明礬水煮半夏所剩礬腳及半夏屑大半和以麥曲造成藥餅為半夏曲時人厭常新喜方中每用何益於病除此之外復有神麯用白麵百斤青蒿辣蓼蒼耳自然汁赤小豆杏仁搗爛拌麵成餅罯黰為曲兒醫認以能治痰止瀉消食之藥每每用之不知其弊別藥煮汁各有氣味若用神麯則藥如稠粥之飲有形之面大能傷胃夫嬰兒有病必忌麵食此黰過之面與醬何異況有藥與草汁並非健脾之品用無益也又藥之偽者如桂枝細辛五味乾薑是也仲師桂枝湯用桂枝去皮者止取梢尖嫩枝內外如一氣味辛香甜辣桂枝皮內骨便去之而不用如是之枝可多得耶今人反用亦必辛香甜辣名為川桂枝方可今藥肆中辛香甜辣之桂枝不可得即有亦暫而不久數十年中余闕之不用不得已而以官桂代之北細辛其細如髮辛香觸鼻苟細不如發辛不觸鼻便為杜衡用之無益五味子惟遼五味最佳其黑如漆之有光其味如醋之滴牙上口生津次則北五味其色紅紫微有光其味亦酸微有香氣今一種黑色如李干兼枯紅之色者用無益也又生薑為子薑宣胃乾薑為母薑溫脾脾胃有母子之分而乾薑生薑亦有母子之分今有金衢溫臺之種薑切片堅實黃亮方能入藥並不是本地之生薑曬乾偽充入口最辣止能辛散表邪溫脾用無益也至藥之宜與不宜先須知藥性之宜否察人之病投之中窾方宜今世俗每用而不知宜否今略舉十數種言之今醫發散每用前胡考前胡別録所收陶宏景雲上古止有柴胡而無前胡之名後人用之是宏景雖收之而實疑之也且前胡降痰逐風耗散消削不若柴胡之芳香清熱解表之謂得也今人不究藥性有病在太陽而早用柴胡有引邪入少陽之説夫柴胡名地勳苗甚芳香從未見邪入於太陽正太陽經藥也傷寒論云無太陽證本論云本太陽病不解轉入少陽者與小柴胡湯謂可從少陽而外達於太陽非少陽經之主藥也其性自下而上從內而外根氣虛者不可用用之是猶揠苗助長故本論有柴胡不中與之誡至於升麻亦拔根之藥今人遇元氣虛脫之證每用升麻欲提之使上豈知升麻本經名周麻以其具升轉周遍之功初病發散可用若裡虛氣陷當補益其元助之使上不可升提升提則上下離脫即便死矣葛根藤蔓延引乃太陽經脈之藥本論云太陽病項背強𠘧𠘧無汗惡風葛根湯主之以明葛根治太陽經脈之病而非陽明之主藥也但色白味辛可資陽明之燥是從陽明而達太陽與柴胡之從少陽而達太陽者其義一也石膏色白味辛性寒為陽明之主藥既為陽明主藥必確有陽明燥熱之證而元氣不虛可用若元氣虛而燥熱必配人參本論所以有人參白虎湯方今人但知石膏清熱瀉火遇傷寒大熱之證不審虛實陰陽每用石膏用之而其病如故復更用之夫用之不效與病便不相宜粗工固執不解明者視之真堪墮淚余治傷寒必審陰陽虛實更必審似陰實陽似陽實陰確為陽明燥熱之證不涉太陽之熱不涉少陽之火裡氣不虛始投石膏配合成方必一劑而奏功此鎮墜寒凝之藥不可屢用而常試者也至兒科治痘亦用石膏以為必先瀉其火毒方可順序行漿以此不經之見橫據胸中無論痘之順逆至三五日間必用石膏以解毒夫氣血調和其毒自解石膏解毒未之聞也且痘原系先天火毒必遇君火相火司天在泉之歲其出也廣是痘非火不出非火不長非火不漿非火不合者也夫痘毒之外復有他火可以暫用而痘內之火無容瀉也其餘雜證或病陽明燥熱亦可用石膏以治然非調和培養之藥不可不慎其用也醫治傷寒發熱必用黃芩清熱謂小柴胡湯有黃芩也夫既病傷寒其身必熱而熱有皮毛肌腠經脈之不同更有寒熱相兼假熱真寒之各異黃芩內空腐外肌皮空腐則內清腸胃之熱肌皮則外清肌表之熱有徹內徹外之功必審其內外皆熱原本壯實胃氣不虛外不涉於毫毛內不涉於經脈方用若泛泛然舉手便用其種禍不知幾許矣本論云僅與黃芩湯徹其熱腹中應冷當不能食戒之也黃芩之外更有知母知母肉白皮黃皮上有毛氣味苦寒稟寒水之性而兼秋金之氣猶水之知有母也故名知母土炎燥而皮毛熱可內資中土之燥外清皮毛之熱若以知母為補藥則非矣葳蕤本經名女萎女子嬌柔之義也一名玉竹色白如玉根節如竹也一名青黏苗葉青翠根汁稠黏也凡此命名皆取陰柔之義後人妄稱葳蕤有人參之功不審陰陽寒熱用為補劑若陰盛陽虛宜溫補者此藥大忌麥冬本經主治心腹結氣傷中傷飽胃絡脈絶以麥冬橫生土中有十二餘粒其中則一心相貫能橫通胃絡而補中故治傷中能橫通胃絡而散結故治傷飽後人用必去心大非先聖格物窮理之意妄謂連心服之則心煩蓋即以連心麥冬煮水飲之煩與不煩可立辨矣澤瀉生於水中其根如芋能行水上滋水氣必上行而後下降非專利小便之藥也今人不明經義謂目疾不可用恐下泄其水則目枯豈知澤瀉正行水上滋之藥也太陽篇五苓散用澤瀉治消渴小便不利以澤瀉行水上滋故治消渴水氣上而始下故利小便猶木通之橫通旁達則小便自利二者皆非下行之藥也參朮苓甘加橘半為六君子湯此健脾和胃補瀉兼行之方也今人治大寒大虛證既用參耆朮薑桂附而廣皮半夏戀戀不捨以六君子湯有橘半故也大抵臨證施治當就病用藥勿執成方廣皮半夏乃辛散發汗之藥不可不知也溫補藥中有不宜歸芍者以其潤泄也歸芍不宜而棗仁滋潤亦不宜也凡人抱病陰不和陽陽不和陰自不能睡如用棗仁便即能睡則天下無不睡之病矣經云人臥則血歸於肝身臥而血不歸肝則不能睡又陰陽交會於坤土太陰土虛陰陽不歸則不能睡又陽明胃脈其氣下行陽明氣逆上而不下則不能睡又厥陰主合陽明亦主合或陽明合而厥陰不合或厥陰合而陽明不合或陽明厥陰皆不能合亦皆不能睡當審其所以不睡之故而施治焉庶其可爾八味丸有熟地桂附所以助三焦之火益腎臟之水乃陰陽兼補水火併治者也如陰虛而陽不虛不宜桂附若陽虛而陰不虛便不宜熟地矣今人遇陽虛之證認為陰虛大用熟地奚可哉辛香下氣寬胸快膈有沉香丁香木香豆蔻砂仁諸品氣味皆屬辛香而功用各有不同沉香從胸膈而下丹田有下沉之義故曰沉丁香其性溫熱助三焦之火以溫胃土丁者火也故曰丁木香本經名五香五者土也採根陰乾一月方枯人身經血一月一周肝木主之故曰本白豆蔻寬胸藥也肺居胸膈之上肺氣不布則胸膈不通豆蔻能達肺金之氣肺屬金其色白故曰白豆蔻砂仁原名縮砂蔤安胎藥也有歸宿丹田退藏於密之義香附乃莎草根中之子子結於根亦有宿密之義故亦主安胎功用與縮砂略同凡此辛香之藥臭味雖同而功用稍殊當辨明而用不可概投混施也天麻苗如赤箭故本經有赤箭之名有風不動無風獨搖故能制風苗不可得但有其根是為天麻與蜀漆不可得但有常山一理也天麻在土形如大魁似皇極之居中周環十二子如十二辰以輔皇極味甘氣平主補中土便從中土以通十二經今人認為祛風之藥但品味甚優誤用亦無害也今人治瘧不用常山以常山為截瘧藥截之早恐成臌脹豈知常山乃治瘧之要藥三陽輕淺之瘧不必用也若太陰脾土虛寒而為脾寒之瘧及間二日發而為三陰之瘧必須溫補之劑佐以常山方能從陰出陽散寒止瘧又謂若服常山終身不可食雞嗟嗟此皆齊東野人之語而明理之醫亦宗此説良可嗤矣夫土虛脾敗天地不交則成臌瘧既愈矣何臌之有鵝鴨鰻鱉其性陰寒病後宜忌雞性溫平補肝暖胃瘧後正可食也終身必禁是誠何説哉本經止有南星並無膽星南星色白味辛稟金氣而祛風豁痰功同半夏今人以牛膽製為瞻星味苦性冷中風痰涎上湧多屬三焦火虛土崩水汛斯時助正散邪壯火祛寒尤恐不濟而粗工昧昧不審其本但治其末服以苦冷之膽星加以清涼之竹瀝必至生陽絶滅而死蒺藜有刺蒺藜白蒺藜二種白蒺藜形如羊腎微有腥氣乃從腎達肺之藥刺蒺藜色白有刺秉堅金攻伐之質破積行瘀乃大消大削之藥詩云牆有茨即刺蒺藜也後人誤以白蒺藜為沙苑蒺藜茨蒺藜為白蒺藜以攻伐之茨認為健脾調補之藥豈不謬哉余每用銀花人多異之謂非癰毒瘡瘍用之何益蓋銀花別録名忍冬藤以銀花之藤至冬不凋乃宣通經脈之藥也又一本之中花有黃白氣甚芳香故有金銀花之名金花走血銀花走氣又調和氣血之藥也通經脈而調氣血何病不宜豈必癰毒而後用之哉診脈大法人身十二經脈交通有道循行有次氣統於先血附於內流行還轉晝夜不停而醫家診脈以左右兩手分寸關尺三部醫以三指候之以醫之一呼一吸候病者之脈其脈應指而動一動謂之一至一呼一吸之間其脈若四至以上或五至以下不數不遲謂之平脈若一呼一吸其脈三至或三至有餘則為遲脈一呼一吸其脈六至或六至有餘則為數脈經云遲為虛寒數為虛熱此識病之法非脈法也然脈之形象又有浮沉滑澀弦緊大小之分浮者泛泛於上輕指即得如水漂木故曰浮沉者沉伏於下重指始得如石下沉故曰沉滑則往來流利如珠走盤而圓轉澀則往來艱澀如刀刮竹而阻滯弦如弓弦按之不移也緊如轉索按之徑急也大乃脈體洪大過於本位也小乃脈體收斂不及本位也此脈之外又有微細芤革微者虛微似有似無也細者細小如發如絲也芤者上有中無如按蔥管也革者外徑而堅如按鼓皮也脈之形象不一須於指下辨明合證參考自有定見然尤當審其脈之圓緩並脈之胃氣圓緩者脈來應指至數均調三部同等也胃氣者輕舉應指重按柔和也若脈不圓緩及無胃氣輕病必重重病必死又病脈之外兼有死脈方書有蝦遊魚翔屋漏雀啄彈石諸説蝦遊者如蝦之遊魚翔者如魚之擺鱗屋漏者至不倫次點滴稀疏雀啄者如雀啄物急疾渙散彈石者堅硬牢實如指彈石蝦遊魚翔屋漏乃散漫不倫之脈也雀啄彈石乃堅強不和之脈也方書之言摹擬亦似此皆脈無胃氣應指無神也見則必死又兩手三部之脈地脈也可以指診面容之色天脈也用以目察六氣調和五行不偏自有正色若面無正色神氣不揚夭色外呈其壽不久諸脈之外又有動脈動脈有二一則三部之脈厥厥動搖圓疾如豆也一則頭額喉旁胸腹脛足躍躍而動此經脈循行環轉於空隙之處微露其端所謂流中溢外也又高陽生脈訣云左心小腸肝膽腎膀胱右肺大腸脾胃包三焦此一臟一腑相為配合合靈樞之脈法也而素問脈法又以兩手寸脈候上關脈候中尺脈候下約而言之右寸候肺左寸候心而膻中上焦附於兩寸右關候脾左關候肝而鬲中中焦胃大小腸附於兩關尺中候腎與膀胱無分左右而季脅血海下焦附於兩尺此上以候上中以候中下以候下素問之脈法為然也又仲師傷寒論平脈篇更有診法以三菽六菽九菽十二菽之由輕而重自舉而按以候五臟之氣故曰如三菽之重者肺氣也如六菽之重者心氣也如九菽之重者脾氣也如十二菽之重者肝氣也按之至骨者腎氣也此又以浮中沉診五臟之氣傷寒論之脈法為然也經論脈法平素俱熟於胸中則論病診視無往不宜矣然有三部無脈移於外絡名為反關脈者此又不可不知也總之脈者五臟六腑之大原有脈則生無脈則死三部脈平病雖劇亦生三部不平病雖輕亦危又脈分左右左主血右主氣男為陽陽者氣也故男子之脈宜於右旺女為陰陰者血也故女子之脈宜於左旺男子右脈和平雖困無害女子左脈和平雖困亦無害蓋五臟所居之位男居於左者女則居於右男居於右者女則居於左素問云男子左為逆右為從女子右為逆左為從所從不同則兩手左右所屬臟腑亦當不同矣至診脈論病如雲某脈系某病某病得某脈不但蛇足且診視之下亦難為據不若但論脈之有神無神和緩與不和緩之為得也至如小兒之脈亦如此法但小兒啼哭不馴不能細診只以一二指按之脈來四五至亦為和平若按之而似有似無或急疾無神兼之病劇亦不能生其視虎口而別以色云小兒脈有六七至者皆妄談也診小兒之脈須知小兒呼吸急疾約以急疾應之可耳由此推之無論大小男女凡病內虛者脈弱為宜洪大則忌初病外感者陽脈為宜陰脈則忌其他脈訣之言多屬不經不可為信欲求診脈之法者考於靈樞詳於素問更合本論辨脈平脈而會通之則得其要矣先生自述余童年喪父家貧無所資藉舌耕以奉母及制舉之業不獲售遂習岐黃之術於倪先生之門所授書有藥性全生集明醫指掌傷寒五法並諸方歌訣以為道在於是二十三歲即懸壺治病頗效多有稱許者然循方投藥究未能刻期應驗甲辰歲餘年二十有八七月中旬患痢甚篤延時醫診治藥日投而病日劇月餘不得愈遂不服藥至仲冬而痢方止因嘆曰醫之不可為也醫治我若是我治人想亦若是以醫覓利草菅人命謂天理何其時隱菴張先生開講經論遂往學焉得究觀傷寒金匱神農本經及素問靈樞諸書朝夕參究始悔前之所習皆非醫學之根源隱菴先生亦以針芥之投無微不晰如是者十年岐黃至理雖未能窺其堂奧而論證施治已不同於往昔之見病治病執風痰氣火感寒停食之説遂循方而投藥也故每遇一證必究其本而探其原處方用藥不同流俗因是人咸謂余偏執嗟嗟人命攸關余豈故為離奇而偏執耶夫只閲方書不明經論知其外不知其內則視余誠偏矣以藥試病中無定見究其末不究其源則視余誠執矣蓋醫理如剝蕉心剝至無可剝方為至理以至理而論病則大中至正一定不移而豈偏執之謂哉余觀經論之暇每閲分門別類之方書皆醫門糟粕也即如薛氏醫案趙氏醫貫醫宗必讀裴子言醫等書亦皆方技之穎悟變通非神農軒岐仲景一脈相傳之大道也方書有云不知十二經絡開口舉手便錯不明五運六氣讀盡方書無濟病有標復有本求得標只取本治千人無一損此言甚善余因及門進論著授醫學真傳以示正道以斥旁門而使學者之不可不慎也余何敢與世爭名哉亦俟知我者之不罪我而已跋靈樞素問神農本經卒病論金匱要略五書皆聖哲之微言醫門之奧旨也習其藝者舍之不習而惟採撮後來之枝辭瑣説以為應世之捷訣是棄本而務末也求其蘇困扶危而不誤致人於死蓋亦難矣高氏懷悲憫之志集為是編以示門人即以是示後世其中略言五運六氣之化臟腑經絡之分周身之部位於三陰三陽各有所屬藥物之氣味色臭不一其性於十一臟各有所宜忌雖語焉未詳然已啓靈素諸書之端緒而指人以升堂入室之所自矣即其中矯枉過正之辭不無一二然繹其首尾全文實為補弊救偏而發初非舉一廢百之偏詞固與靈素諸書大旨有相合無相悖也人能因其説而廣求之五書於以精參聖哲之微言奧旨而得醫門之管轄庶幾可以視人之疾而蘇困扶危不流為鹵莽滅裂之粗工也歟乾隆丙戌八月中秋前四日戊申錢江王琦
